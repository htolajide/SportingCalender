name: CI - Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: sportradar_calendar
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3307 -u user -ppassword -e "SELECT 1" &> /dev/null; then
              echo "MySQL is ready!"
              exit 0
            fi
            echo "Waiting... attempt $i/30"
            sleep 2
          done
          echo "MySQL failed to become ready"
          exit 1

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Run Unit Tests (AllTests)
        run: mvn test 

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Build JAR for deployment
        run: mvn package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sporting-calender-jar
          path: target/SportingCalender-*.jar

  code-quality:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Maven Verify (includes checkstyle if configured)
        run: mvn verify -DskipTests

  selenium-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: sportradar_calendar
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome for Selenium
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3307 -u user -ppassword -e "SELECT 1" &> /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Start Application in Background
        run: |
          mvn spring-boot:run &
          echo "Waiting for app to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8081/api/events > /dev/null; then
              echo "Application is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "Application failed to start"
          exit 1

      - name: Run Selenium Tests
        run: mvn test -Dtest=SeleniumFrontendTest

      - name: Upload Selenium Screenshots (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: target/screenshots/