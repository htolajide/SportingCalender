<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event - Sportradar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Sportradar Calendar</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="add-event.html">Add Event</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Add New Event</h2>
        <form id="addEventForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" id="dateVenue" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Time (UTC)</label>
                    <input type="time" class="form-control" id="timeVenueUtc" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Home Team Name</label>
                    <input type="text" class="form-control" id="homeTeamName" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Away Team Name</label>
                    <input type="text" class="form-control" id="awayTeamName" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Competition</label>
                <input type="text" class="form-control" id="competitionName" value="AFC Champions League" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stage</label>
                <input type="text" class="form-control" id="stageName" value="ROUND OF 16" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" id="status">
                    <option value="scheduled">Scheduled</option>
                    <option value="played">Played</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Create Event</button>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
